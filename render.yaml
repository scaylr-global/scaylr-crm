# Render.com Blueprint — deploys Scaylr CRM as a single web service.
# The app data lives in an external free Postgres (e.g. Neon), so NO paid disk
# is needed — this runs on Render's FREE plan.
#
# After connecting this blueprint, set DATABASE_URL in the Render dashboard to
# your Neon connection string (it is marked sync:false so it is not stored here).
#
# Note: the free web service sleeps after ~15 min of inactivity, so the first
# request after idle takes ~30-50s to wake. Your data is always safe in Postgres.
services:
  - type: web
    name: scaylr-crm
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run build:deploy
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random secret
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the dashboard
