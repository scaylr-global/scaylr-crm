# Render.com Blueprint — deploys Scaylr CRM as a single web service.
# SQLite data is persisted to a Render Disk (25 GB free on individual plan).
#
# Note: the free web service sleeps after ~15 min of inactivity.
services:
  - type: web
    name: scaylr-crm
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run build:deploy
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/scaylr.db
      - key: ANTHROPIC_API_KEY
        sync: false  # paste your API key in the Render dashboard
    disk:
      name: scaylr-data
      mountPath: /data
      sizeGB: 1
